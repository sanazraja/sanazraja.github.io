<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sana Raja | Data & Operations Leader</title>
    <!-- Google Fonts / System Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --primary:#44a27a;--primary-light:#6fd3a5;--bg:#071b14;
          --glass:rgba(255,255,255,0.06);--glass-strong:rgba(255,255,255,0.12);
          --border:rgba(255,255,255,0.15);--text:#eafff5;--muted:#b8e8d5;--radius:22px;
        }
        body{font-family:'Inter',system-ui;color:var(--text);background:radial-gradient(circle at 10% 20%,#0d2e23,transparent),radial-gradient(circle at 90% 0%,#134a36,transparent),var(--bg);padding:20px;min-height:100vh}
        
        /* SKELETON */
        @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
        .skel{border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.05) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite linear}
        .skel-circle{border-radius:50%}
        .skel-text{height:14px;margin-bottom:10px}
        .skel-title{height:20px;width:60%;margin-bottom:12px}
        .skel-btn{height:36px;border-radius:40px}
        .skel-avatar{width:130px;height:130px}
        .skel-badge{height:28px;width:160px;border-radius:10px}
        .skel-stat{height:70px;border-radius:18px;flex:1;min-width:120px}
        .skel-tag{height:36px;width:110px;border-radius:10px;display:inline-block;margin:4px}
        .skel-card{height:200px;border-radius:18px;margin-bottom:18px}
        .skel-entry{height:120px;border-radius:18px;margin-bottom:20px}
        
        /* FADE IN */
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .fade-in{animation:fadeUp .5s ease forwards}
        .fade-in-d1{animation-delay:.1s;opacity:0}
        .fade-in-d2{animation-delay:.2s;opacity:0}
        .fade-in-d3{animation-delay:.3s;opacity:0}
        .fade-in-d4{animation-delay:.4s;opacity:0}
        
        /* CONTAINER */
        .container{max-width:1300px;margin:auto;display:flex;gap:24px;align-items:flex-start}
        .glass{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 10px 40px rgba(0,0,0,.35)}
        .glass-card{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 10px 40px rgba(0,0,0,.35)}
        
        /* SIDEBAR */
        #sidebar{width:300px;padding:26px 22px;position:sticky;top:20px;display:flex;flex-direction:column;align-items:center}
        .avatar-wrap{position:relative;margin-bottom:16px}
        .avatar-ring{width:138px;height:138px;border-radius:50%;padding:4px;background:conic-gradient(var(--primary),var(--primary-light),var(--primary));}
        @keyframes spin{to{transform:rotate(360deg)}}
        .avatar-inner{width:130px;height:130px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;position:absolute;top:4px;left:4px}
        #profile-pic{width:126px;height:126px;border-radius:50%;object-fit:cover;display:block}
        #name{font-size:1.5rem;font-weight:600;margin-bottom:8px;text-align:center;background:linear-gradient(45deg,#fff,var(--primary));-webkit-background-clip:text;color:transparent}
        #title-badge{background:rgba(255,255,255,.06);padding:5px 14px;border-radius:10px;font-size:.72rem;margin-bottom:18px;color:var(--muted)}
        .divider{width:100%;height:1px;background:var(--border);margin:16px 0}
        .contact-list{width:100%;display:flex;flex-direction:column;gap:14px}
        .contact-item{display:flex;gap:12px;align-items:center;cursor:default}
        .icon-box{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:.3s;flex-shrink:0}
        .contact-item:hover .icon-box{background:var(--primary);color:#05231a;transform:scale(1.1)}
        .contact-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
        .contact-value{color:var(--muted);font-size:.85rem;text-decoration:none}
        .contact-info{display:flex;flex-direction:column;gap:3px;align-items: flex-start;}
        .social-links{margin:18px 0;display:flex;gap:12px}
        .social-links a{font-size:1.15rem;opacity:.7;transition:.3s;color:var(--muted);text-decoration:none}
        .social-links a:hover{opacity:1;transform:translateY(-3px)}
        #resume-btn{width:100%;display:block;text-align:center;padding:11px;border-radius:12px;background:linear-gradient(45deg,var(--primary),var(--primary-light));color:#05231a;font-weight:700;text-decoration:none;transition:.3s;font-size:.9rem;position:relative;overflow:hidden}
        #resume-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);transform:translateX(-100%);transition:.4s}
        #resume-btn:hover::after{transform:translateX(100%)}
        #resume-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(68,162,122,.4)}
        
        /* MAIN */
        #main-content{flex:1;padding:28px;min-width:0}
        .navbar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;padding-bottom:0}
        .nav-btn{background:none;border:none;color:var(--muted);font-size:.9rem;cursor:pointer;padding:10px 14px;border-radius:8px 8px 0 0;transition:.25s;white-space:nowrap;position:relative}
        .nav-btn::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--primary);transform:scaleX(0);transition:.25s}
        .nav-btn:hover{color:#fff;background:rgba(255,255,255,.04)}
        .nav-btn.active-tab{color:#fff}
        .nav-btn.active-tab::after{transform:scaleX(1)}
        .section{display:none}
        .section.active{display:block}
        
        h2{font-size:1.8rem;margin-bottom:14px;background:linear-gradient(45deg,#fff,var(--primary));-webkit-background-clip:text;color:transparent;display:inline-block}
        
        /* STATS */
        .stats-grid{display:flex;gap:12px;margin:20px 0;flex-wrap:wrap}
        .stat-box{flex:1;min-width:130px;padding:16px;border-radius:18px;background:var(--glass-strong);border:1px solid var(--border);transition:.3s;cursor:default}
        .stat-box:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 12px 30px rgba(68,162,122,.2)}
        .stat-box .number{font-size:1.5rem;color:var(--primary);font-weight:700}
        .stat-box .label{font-size:.75rem;color:var(--muted);margin-top:4px}
        
        /* SKILLS */
        .skills-heading{margin:24px 0 10px;font-size:1.05rem;color:var(--muted);font-weight:600}
        .skill-tags{display:flex;flex-wrap:wrap;gap:8px}
        .skill-tag{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:var(--glass);border:1px solid var(--border);font-size:.78rem;transition:.3s;cursor:default}
        .skill-tag:hover{border-color:var(--primary);transform:translateY(-2px);background:rgba(68,162,122,.08)}
        .skill-icon{width:16px;height:16px;object-fit:contain}
        
        /* TIMELINE */
        .timeline{position:relative;padding-left:56px;margin-top:20px}
        .timeline::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--primary),transparent)}
        .entry{position:relative;background:var(--glass);padding:20px;border-radius:18px;margin-bottom:22px;border:1px solid var(--border);transition:.35s;cursor:default}
        .entry:hover{transform:translateX(6px);border-color:var(--primary);box-shadow:0 8px 30px rgba(68,162,122,.15)}
        .timeline-icon{position:absolute;left:-56px;top:18px;width:38px;height:38px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.3s}
        .entry:hover .timeline-icon{background:var(--primary);color:#05231a;transform:scale(1.1)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
        .entry-title{font-size:1.05rem;font-weight:600}
        .entry-company{font-size:.88rem;color:var(--muted);margin-top:3px}
        .entry-date{background:rgba(68,162,122,.12);border:1px solid rgba(68,162,122,.3);padding:5px 11px;border-radius:20px;font-size:.72rem;color:var(--primary);white-space:nowrap}
        .entry-desc{font-size:.83rem;color:var(--muted);line-height:1.6;margin-top:10px;display:none}
        .entry.expanded .entry-desc{display:block}
        .expand-btn{background:none;border:none;color:var(--primary);font-size:.75rem;cursor:pointer;margin-top:8px;padding:4px 0;transition:.2s;display:flex;align-items:center;gap:4px}
        .expand-chevron{display:inline-block;transition:transform .3s}
        .entry.expanded .expand-chevron{transform:rotate(180deg)}
        
        /* PROJECTS */
        .projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
        .project-box{background:var(--glass);padding:0;border-radius:18px;border:1px solid var(--border);transition:.35s;overflow:hidden;cursor:pointer}
        .project-box:hover{transform:translateY(-8px);border-color:var(--primary);box-shadow:0 16px 40px rgba(68,162,122,.2)}
        .project-thumb{width:100%;height:150px;object-fit:cover;display:block}
        .project-body{padding:14px}
        .project-domain{font-size:.72rem;color:var(--primary);margin-bottom:4px}
        .project-title{font-size:.95rem;font-weight:600;margin-bottom:6px}
        .project-short-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
        .project-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
        .btn-link{background:none;border:none;color:var(--primary);font-size:.8rem;cursor:pointer;font-weight:600;transition:.2s}
        .btn-link:hover{opacity:.7}
        .tool-icon{width:22px;height:22px;object-fit:contain;opacity:.8}
        
        /* CONTACT */
        .contact-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:18px}
        .contact-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:var(--glass);border:1px solid var(--border);transition:.25s;text-decoration:none;color:inherit}
        .contact-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 10px 25px rgba(0,0,0,.25)}
        .icon-box-large{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;transition:.3s}
        .contact-card:hover .icon-box-large{background:var(--primary);color:#05231a}
        .contact-form-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:18px}
        .form-title{font-weight:600;margin-bottom:14px;font-size:.95rem}
        .form-input{width:100%;margin-bottom:10px;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:#fff;font-size:.85rem;font-family:inherit;transition:.3s;outline:none}
        .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(68,162,122,.15)}
        .form-submit-btn{width:100%;padding:11px;border-radius:30px;border:none;background:linear-gradient(45deg,var(--primary),var(--primary-light));color:#05231a;font-weight:700;cursor:pointer;transition:.3s;font-size:.9rem;position:relative;overflow:hidden}
        .form-submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(68,162,122,.4)}
        
        /* PULSE DOT */
        .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);display:inline-block;animation:pulse 2s infinite;margin-right:6px}
        @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
        
        /* MODAL (fixed duplicate issue) */
        #project-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);align-items:center;justify-content:center;z-index:9999}
        #project-modal.open{display:flex}
        .modal-content{width:90%;max-width:1100px;background:#0c2a1f;border:1px solid var(--border);border-radius:28px;padding:28px;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px}
        .close-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:#fff;font-size:1.1rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s}
        .close-btn:hover{background:var(--primary);color:#05231a;transform:rotate(90deg)}
        .modal-top-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:24px}
        .modal-image-container{position:relative}
        .modal-image-container img{width:100%;border-radius:20px;border:1px solid var(--border);max-height:300px;object-fit:cover}
        .fullscreen-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);border:none;color:white;font-size:1.2rem;width:36px;height:36px;border-radius:50%;cursor:pointer;backdrop-filter:blur(4px);transition:.2s}
        .fullscreen-btn:hover{background:var(--primary);color:#05231a}
        .tools-list{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
        .tool-badge{background:var(--glass-strong);padding:6px 12px;border-radius:30px;font-size:.75rem;border:1px solid var(--border)}
        .carousel-container{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);flex-wrap:wrap}
        .carousel-btn{background:var(--glass);border:1px solid var(--border);color:var(--text);font-size:1.4rem;padding:8px 14px;border-radius:50%;cursor:pointer;transition:.2s;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
        .carousel-btn:hover{background:var(--primary);color:#05231a;transform:scale(1.05)}
        #carousel-img{max-width:70%;border-radius:18px;border:1px solid var(--border);max-height:200px;object-fit:cover}
        #carousel-caption{width:100%;text-align:center;font-size:.8rem;color:var(--muted);margin-top:8px}
        @media(max-width:860px){.container{flex-direction:column}#sidebar{width:100%;position:static}.contact-wrapper{grid-template-columns:1fr}.modal-top-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">

<aside id="sidebar" class="glass-card">
  <div class="avatar-wrap">
    <div class="avatar-ring" id="avatar-skeleton-ring">
      <div class="avatar-inner">
        <div class="skel skel-circle" style="width:126px;height:126px" id="avatar-skel"></div>

    </div>
  </div>

  <div class="skel skel-badge" id="badge-skel"></div>
  <div class="divider"></div>

<main id="main-content" class="glass-card">
  <nav class="navbar">

  <!-- ABOUT SKELETON -->
  <div id="about-skeleton">

      </div>

<script>
// ---- FIXED GLOBALS ----
let currentCarouselImages = [];
let currentCarouselCaption = "";
let currentSlideIndex = 0;

function openFullscreen(imgSrc) {
  const fullWin = window.open();
  fullWin.document.write(`<html><head><style>body{margin:0;display:flex;justify-content:center;align-items:center;background:#000;height:100vh} img{max-width:95vw;max-height:95vh;object-fit:contain}</style></head><body><img src="${imgSrc}" alt="fullscreen"></body></html>`);
}
function changeSlide(direction) {
  if (!currentCarouselImages.length) return;
  currentSlideIndex = (currentSlideIndex + direction + currentCarouselImages.length) % currentCarouselImages.length;
  const carImg = document.getElementById("carousel-img");
  if(carImg) carImg.src = currentCarouselImages[currentSlideIndex];
  const cap = document.getElementById("carousel-caption");
  if(cap) cap.textContent = currentCarouselCaption + (currentCarouselImages.length > 1 ? ` (${currentSlideIndex+1}/${currentCarouselImages.length})` : "");
}
function closeModal(){ document.getElementById("project-modal").classList.remove("open"); }

function toggleEntry(entry){
  entry.classList.toggle("expanded");
  const spanBtn = entry.querySelector(".expand-btn span:first-child");
  if(spanBtn) spanBtn.textContent = entry.classList.contains("expanded") ? "Show less" : "Read more";
}

// ---- Helper showPage ----
function showPage(pageId, btnElement){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active-tab"));
  document.getElementById(pageId).classList.add("active");
  if(btnElement) btnElement.classList.add("active-tab");
}

function openModal(id){
  const p = projectsData.find(x=>x.id===id);
  if(!p) return;
  document.getElementById("modal-header-title").innerHTML = p.title;
  document.getElementById("modal-primary-tag").textContent = p.primaryTag;
  document.getElementById("modal-title").textContent = p.title;
  document.getElementById("modal-domain").textContent = p.domain;
  document.getElementById("modal-desc").textContent = p.shortDesc;
  const toolsHtml = p.tools.map(t => `<span class="tool-badge">${t}</span>`).join('');
  document.getElementById("modal-tools-list").innerHTML = toolsHtml;
  document.getElementById("modal-image").src = p.image;
  document.getElementById("modal-image-caption").textContent = p.caption || "Project visual";
  document.getElementById("modal-details-content").innerHTML = p.details;
  const topIconDiv = document.getElementById("modal-top-icon");
  if(p.topIcon) topIconDiv.innerHTML = `<img src="${p.topIcon}" style="width:36px; height:36px; object-fit:contain;">`;
  else topIconDiv.innerHTML = "";
  
  let imagesArray = p.bottomImages && p.bottomImages.length ? [...p.bottomImages] : [p.image];
  if(p.bottomImages && p.bottomImages.length && !imagesArray.includes(p.image)) imagesArray.unshift(p.image);
  currentCarouselImages = imagesArray;
  currentCarouselCaption = p.caption || "";
  currentSlideIndex = 0;
  const carImg = document.getElementById("carousel-img");
  if(carImg && currentCarouselImages.length) carImg.src = currentCarouselImages[0];
  const carCap = document.getElementById("carousel-caption");
  if(carCap) carCap.textContent = currentCarouselCaption + (currentCarouselImages.length > 1 ? " (1/"+currentCarouselImages.length+")" : "");
  document.getElementById("project-modal").classList.add("open");
}
